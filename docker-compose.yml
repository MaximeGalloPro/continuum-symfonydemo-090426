services:
  app:
    build:
      context: .
      target: dev
    # No ports exposed - we use docker exec for commands
    volumes:
      - .:/app
      - /app/node_modules  # Volume anonyme pour isoler node_modules
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/app?schema=public
    depends_on:
      db:
        condition: service_healthy
    stdin_open: true
    tty: true
    command: ["npm", "run", "dev"]  # Démarre NestJS automatiquement

  frontend:
    build:
      context: ./frontend
      target: dev
    volumes:
      - ./frontend:/app
      - /app/node_modules  # Volume anonyme pour isoler node_modules
      - ./frontend/screenshots:/app/screenshots  # Screenshots persistés
    environment:
      - VITE_API_URL=http://app:3000
    depends_on:
      - app
    stdin_open: true
    tty: true
    command: ["tail", "-f", "/dev/null"]  # Garde le container actif pour exec

  db:
    image: postgres:16-alpine
    # No ports exposed - app connects internally via service name
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: app
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
